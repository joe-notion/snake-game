<!DOCTYPE html>
<html>
<head>
  <title>Basic Snake HTML Game</title>
  <meta charset="UTF-8">
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    border: 1px solid white;
  }

  /* start screen / main menu overlay */
  #start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.92);
    z-index: 10;
  }
  #start-screen.hidden {
    display: none;
  }
  .menu {
    width: 100%;
    max-width: 360px;
    text-align: center;
    color: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
  }
  .menu h1 {
    margin: 0 0 12px;
    font-size: 40px;
    letter-spacing: 2px;
    color: #4caf50;
  }
  .menu .goal {
    margin: 0 0 20px;
    font-size: 16px;
    line-height: 1.5;
  }
  .how-to-play {
    text-align: left;
    margin: 0 0 24px;
    padding: 12px 16px;
    background: #111111;
    border: 1px solid #333333;
    border-radius: 8px;
  }
  .how-to-play h2 {
    margin: 0 0 8px;
    font-size: 16px;
    color: #ffffff;
  }
  .how-to-play ul {
    margin: 0;
    padding-left: 20px;
    font-size: 15px;
    line-height: 1.6;
  }
  .how-to-play .mobile-note {
    margin: 10px 0 0;
    font-size: 13px;
    color: #bbbbbb;
  }
  #play-button {
    padding: 14px 44px;
    font-size: 18px;
    font-weight: bold;
    color: #000000;
    background: #4caf50;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  #play-button:hover {
    background: #5bc75f;
  }
  #play-button:focus {
    outline: 3px solid #ffffff;
    outline-offset: 2px;
  }
  </style>
</head>
<body>
<div id="start-screen">
  <div class="menu">
    <h1>Snake</h1>
    <p class="goal">Eat the red apples to grow as long as you can &mdash; just don't crash into your own tail!</p>
    <div class="how-to-play">
      <h2>How to play</h2>
      <ul>
        <li><strong>Arrow keys</strong> &mdash; move up, down, left, and right</li>
      </ul>
      <p class="mobile-note">Mobile touch controls coming soon.</p>
    </div>
    <button type="button" id="play-button">Play</button>
  </div>
</div>
<canvas width="400" height="400" id="game"></canvas>
<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');

// the canvas width & height, snake x & y, and the apple x & y, all need to be a multiples of the grid size in order for collision detection to work
// (e.g. 16 * 25 = 400)
var grid = 16;
var count = 0;

var snake = {
  x: 160,
  y: 160,

  // snake velocity. moves one grid length every frame in either the x or y direction
  dx: grid,
  dy: 0,

  // keep track of all grids the snake body occupies
  cells: [],

  // length of the snake. grows when eating an apple
  maxCells: 4
};
var apple = {
  x: 320,
  y: 320
};

// get random whole numbers in a specific range
// @see https://stackoverflow.com/a/1527820/2124254
function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

// game loop
function loop() {
  requestAnimationFrame(loop);

  // slow game loop to 15 fps instead of 60 (60/15 = 4)
  if (++count < 4) {
    return;
  }

  count = 0;
  context.clearRect(0,0,canvas.width,canvas.height);

  // move snake by it's velocity
  snake.x += snake.dx;
  snake.y += snake.dy;

  // wrap snake position horizontally on edge of screen
  if (snake.x < 0) {
    snake.x = canvas.width - grid;
  }
  else if (snake.x >= canvas.width) {
    snake.x = 0;
  }

  // wrap snake position vertically on edge of screen
  if (snake.y < 0) {
    snake.y = canvas.height - grid;
  }
  else if (snake.y >= canvas.height) {
    snake.y = 0;
  }

  // keep track of where snake has been. front of the array is always the head
  snake.cells.unshift({x: snake.x, y: snake.y});

  // remove cells as we move away from them
  if (snake.cells.length > snake.maxCells) {
    snake.cells.pop();
  }

  // draw apple
  context.fillStyle = 'red';
  context.fillRect(apple.x, apple.y, grid-1, grid-1);

  // draw snake one cell at a time
  context.fillStyle = 'green';
  snake.cells.forEach(function(cell, index) {

    // drawing 1 px smaller than the grid creates a grid effect in the snake body so you can see how long it is
    context.fillRect(cell.x, cell.y, grid-1, grid-1);

    // snake ate apple
    if (cell.x === apple.x && cell.y === apple.y) {
      snake.maxCells++;

      // canvas is 400x400 which is 25x25 grids
      apple.x = getRandomInt(0, 25) * grid;
      apple.y = getRandomInt(0, 25) * grid;
    }

    // check collision with all cells after this one (modified bubble sort)
    for (var i = index + 1; i < snake.cells.length; i++) {

      // snake occupies same space as a body part. reset game
      if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
        snake.x = 160;
        snake.y = 160;
        snake.cells = [];
        snake.maxCells = 4;
        snake.dx = grid;
        snake.dy = 0;

        apple.x = getRandomInt(0, 25) * grid;
        apple.y = getRandomInt(0, 25) * grid;
      }
    }
  });
}

// listen to keyboard events to move the snake
document.addEventListener('keydown', function(e) {
  // ignore movement keys until the game has started from the start screen
  if (!running) {
    return;
  }

  // prevent snake from backtracking on itself by checking that it's
  // not already moving on the same axis (pressing left while moving
  // left won't do anything, and pressing right while moving left
  // shouldn't let you collide with your own body)

  // left arrow key
  if (e.which === 37 && snake.dx === 0) {
    snake.dx = -grid;
    snake.dy = 0;
  }
  // up arrow key
  else if (e.which === 38 && snake.dy === 0) {
    snake.dy = -grid;
    snake.dx = 0;
  }
  // right arrow key
  else if (e.which === 39 && snake.dx === 0) {
    snake.dx = grid;
    snake.dy = 0;
  }
  // down arrow key
  else if (e.which === 40 && snake.dy === 0) {
    snake.dy = grid;
    snake.dx = 0;
  }
});

// start screen: the game waits in a "not started" state until Play is pressed
var running = false;
var loopStarted = false;
var startScreen = document.getElementById('start-screen');
var playButton = document.getElementById('play-button');

// reset all game state back to its initial values
function resetGame() {
  snake.x = 160;
  snake.y = 160;
  snake.dx = grid;
  snake.dy = 0;
  snake.cells = [];
  snake.maxCells = 4;

  apple.x = 320;
  apple.y = 320;

  count = 0;
}

// dismiss the start screen and begin gameplay
function startGame() {
  resetGame();
  startScreen.classList.add('hidden');
  running = true;

  // move focus off the button so gameplay keys aren't captured by it
  playButton.blur();

  // only ever kick off a single game loop
  if (!loopStarted) {
    loopStarted = true;
    requestAnimationFrame(loop);
  }
}

// Play is actionable by mouse click and by keyboard (Enter/Space fire a click)
playButton.addEventListener('click', startGame);

// focus Play on load so keyboard-only players can start immediately
playButton.focus();
</script>
</body>
</html>
