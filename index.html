<!DOCTYPE html>
<html>
<head>
  <title>Basic Snake HTML Game</title>
  <meta charset="UTF-8">
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  canvas {
    border: 1px solid white;
    display: block;
  }

  /* wrapper lets the start screen sit directly on top of the canvas */
  .game-container {
    position: relative;
  }

  /* start screen overlay */
  #start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 24px;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.92);
    color: #ffffff;
    text-align: center;
  }
  /* fully remove the overlay once the game starts so it can't intercept input */
  #start-screen[hidden] {
    display: none;
  }
  #start-screen h1 {
    margin: 0;
    font-size: 42px;
    letter-spacing: 3px;
    color: #4caf50;
  }
  #start-screen .objective {
    margin: 0;
    max-width: 300px;
    font-size: 15px;
    line-height: 1.4;
  }
  #play-button {
    font-size: 20px;
    font-weight: bold;
    padding: 10px 36px;
    color: #ffffff;
    background: #4caf50;
    border: 2px solid #4caf50;
    border-radius: 6px;
    cursor: pointer;
  }
  #play-button:hover {
    background: #45a047;
  }
  /* clear, visible focus indicator for keyboard users */
  #play-button:focus {
    outline: 3px solid #ffffff;
    outline-offset: 3px;
  }
  .how-to-play {
    font-size: 13px;
    line-height: 1.6;
  }
  .how-to-play h2 {
    margin: 0 0 6px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #bbbbbb;
  }
  .how-to-play ul {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .how-to-play kbd {
    display: inline-block;
    min-width: 14px;
    padding: 1px 6px;
    background: #222222;
    border: 1px solid #555555;
    border-radius: 4px;
    font-family: monospace;
  }
  .mobile-note {
    margin: 6px 0 0;
    font-size: 12px;
    color: #888888;
  }
  </style>
</head>
<body>
<div class="game-container">
  <canvas width="400" height="400" id="game"></canvas>

  <!-- start screen: shown on load, hidden once the player presses Play -->
  <div id="start-screen" aria-labelledby="start-title">
    <h1 id="start-title">Snake</h1>
    <p class="objective">Eat the red apples to grow longer. Don&rsquo;t crash into your own tail!</p>
    <button id="play-button" type="button">Play</button>
    <div class="how-to-play">
      <h2>How to play</h2>
      <ul>
        <li><kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&larr;</kbd> <kbd>&rarr;</kbd> &nbsp;Arrow keys to move</li>
      </ul>
      <p class="mobile-note">Mobile controls coming soon</p>
    </div>
  </div>
</div>
<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');

// the canvas width & height, snake x & y, and the apple x & y, all need to be a multiples of the grid size in order for collision detection to work
// (e.g. 16 * 25 = 400)
var grid = 16;
var count = 0;

// the game waits on the start screen until the player presses Play
var gameStarted = false;

var snake = {
  x: 160,
  y: 160,

  // snake velocity. moves one grid length every frame in either the x or y direction
  dx: grid,
  dy: 0,

  // keep track of all grids the snake body occupies
  cells: [],

  // length of the snake. grows when eating an apple
  maxCells: 4
};
var apple = {
  x: 320,
  y: 320
};

// get random whole numbers in a specific range
// @see https://stackoverflow.com/a/1527820/2124254
function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

// game loop
function loop() {
  requestAnimationFrame(loop);

  // slow game loop to 15 fps instead of 60 (60/15 = 4)
  if (++count < 4) {
    return;
  }

  count = 0;
  context.clearRect(0,0,canvas.width,canvas.height);

  // move snake by it's velocity
  snake.x += snake.dx;
  snake.y += snake.dy;

  // wrap snake position horizontally on edge of screen
  if (snake.x < 0) {
    snake.x = canvas.width - grid;
  }
  else if (snake.x >= canvas.width) {
    snake.x = 0;
  }

  // wrap snake position vertically on edge of screen
  if (snake.y < 0) {
    snake.y = canvas.height - grid;
  }
  else if (snake.y >= canvas.height) {
    snake.y = 0;
  }

  // keep track of where snake has been. front of the array is always the head
  snake.cells.unshift({x: snake.x, y: snake.y});

  // remove cells as we move away from them
  if (snake.cells.length > snake.maxCells) {
    snake.cells.pop();
  }

  // draw apple
  context.fillStyle = 'red';
  context.fillRect(apple.x, apple.y, grid-1, grid-1);

  // draw snake one cell at a time
  context.fillStyle = 'green';
  snake.cells.forEach(function(cell, index) {

    // drawing 1 px smaller than the grid creates a grid effect in the snake body so you can see how long it is
    context.fillRect(cell.x, cell.y, grid-1, grid-1);

    // snake ate apple
    if (cell.x === apple.x && cell.y === apple.y) {
      snake.maxCells++;

      // canvas is 400x400 which is 25x25 grids
      apple.x = getRandomInt(0, 25) * grid;
      apple.y = getRandomInt(0, 25) * grid;
    }

    // check collision with all cells after this one (modified bubble sort)
    for (var i = index + 1; i < snake.cells.length; i++) {

      // snake occupies same space as a body part. reset game
      if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
        snake.x = 160;
        snake.y = 160;
        snake.cells = [];
        snake.maxCells = 4;
        snake.dx = grid;
        snake.dy = 0;

        apple.x = getRandomInt(0, 25) * grid;
        apple.y = getRandomInt(0, 25) * grid;
      }
    }
  });
}

// listen to keyboard events to move the snake
document.addEventListener('keydown', function(e) {
  // ignore movement keys until the player has started the game from the start screen
  if (!gameStarted) {
    return;
  }

  // prevent snake from backtracking on itself by checking that it's
  // not already moving on the same axis (pressing left while moving
  // left won't do anything, and pressing right while moving left
  // shouldn't let you collide with your own body)

  // left arrow key
  if (e.which === 37 && snake.dx === 0) {
    snake.dx = -grid;
    snake.dy = 0;
  }
  // up arrow key
  else if (e.which === 38 && snake.dy === 0) {
    snake.dy = -grid;
    snake.dx = 0;
  }
  // right arrow key
  else if (e.which === 39 && snake.dx === 0) {
    snake.dx = grid;
    snake.dy = 0;
  }
  // down arrow key
  else if (e.which === 40 && snake.dy === 0) {
    snake.dy = grid;
    snake.dx = 0;
  }
});

// start screen: begin gameplay only when the player presses Play
var startScreen = document.getElementById('start-screen');
var playButton = document.getElementById('play-button');

function startGame() {
  if (gameStarted) {
    return;
  }
  gameStarted = true;

  // fully hide the overlay so it can no longer intercept clicks or focus
  startScreen.hidden = true;

  // start the game loop from the normal initial conditions
  requestAnimationFrame(loop);
}

// a native <button> fires 'click' for mouse clicks as well as Enter/Space
// when focused, so this single handler covers all required activation methods
playButton.addEventListener('click', startGame);

// focus Play on load so keyboard-only players can start with Enter/Space right away
playButton.focus();
</script>
</body>
</html>
